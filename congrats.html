<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shape Counter | Congrats</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Bricolage+Grotesque:wght@600;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg1: #effaf3;
      --bg2: #fff7ec;
      --ink: #132238;
      --win: #1f9d63;
      --win-soft: #dff6ea;
      --accent: #ff6b35;
      --card: #ffffffef;
      --radius: 20px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Space Grotesk", system-ui, sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 20% 20%, #1f9d6326, transparent 35%),
        radial-gradient(circle at 85% 15%, #ff6b3522, transparent 35%),
        linear-gradient(140deg, var(--bg1), var(--bg2));
      display: grid;
      place-items: center;
      padding: 1.2rem;
    }

    .card {
      width: min(760px, 100%);
      background: var(--card);
      border: 1px solid #ffffff;
      border-radius: var(--radius);
      box-shadow: 0 18px 45px #13223822;
      padding: clamp(1.4rem, 4vw, 2.6rem);
      text-align: center;
      animation: pop-in 500ms ease;
    }

    h1 {
      margin: 0;
      font-family: "Bricolage Grotesque", "Space Grotesk", sans-serif;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      letter-spacing: -0.02em;
    }

    .badge {
      display: inline-block;
      margin-top: 0.7rem;
      background: var(--win-soft);
      color: #11633e;
      border: 1px solid #bde7d1;
      font-weight: 700;
      border-radius: 999px;
      padding: 0.4rem 0.85rem;
    }

    p {
      margin: 0.95rem auto 0;
      max-width: 50ch;
      color: #2e4556;
      font-size: 1.05rem;
    }

    .result {
      margin-top: 1.25rem;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--win);
    }

    .actions {
      margin-top: 1.4rem;
      display: flex;
      justify-content: center;
      gap: 0.7rem;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 0.7rem 1rem;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .play {
      color: #fff;
      background: linear-gradient(145deg, var(--win), #2cbf7b);
    }

    .home {
      color: #fff;
      background: linear-gradient(145deg, #314a62, #4f6f8d);
    }

    .sparkles {
      margin: 1rem auto 0;
      font-size: 2rem;
      letter-spacing: 0.5rem;
      animation: twinkle 900ms ease-in-out infinite alternate;
      user-select: none;
    }

    @keyframes pop-in {
      from {
        opacity: 0;
        transform: translateY(10px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes twinkle {
      from {
        transform: translateY(0);
        opacity: 0.7;
      }
      to {
        transform: translateY(-2px);
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Nice Work!</h1>
    <div class="badge">Correct Answer</div>
    <div class="sparkles" aria-hidden="true">* * *</div>

    <p>You counted correctly and completed the round.</p>
    <p class="result" id="resultLine">You found --.</p>

    <div class="actions">
      <button class="play" id="playAgainBtn" type="button">Play Again</button>
      <button class="home" id="homeBtn" type="button">Choose New Shape</button>
    </div>
  </main>

  <script>
    const WIN_KEY = "shapeCounter:lastWin";
    const winRaw = sessionStorage.getItem(WIN_KEY);

    if (!winRaw) {
      window.location.replace("home.html");
    } else {
      try {
        const win = JSON.parse(winRaw);
        const label = win.shape === "square" ? "square" : "circle";
        const resultLine = document.getElementById("resultLine");
        resultLine.textContent = `You found ${win.count} ${label}${win.count === 1 ? "" : "s"}.`;
      } catch {
        window.location.replace("home.html");
      }
    }

    sessionStorage.removeItem(WIN_KEY);

    document.getElementById("playAgainBtn").addEventListener("click", () => {
      const selectedShape = localStorage.getItem("shapeCounter:selectedShape");
      const nextPage = selectedShape === "square" ? "squares.html" : "circles.html";
      window.location.href = nextPage;
    });

    document.getElementById("homeBtn").addEventListener("click", () => {
      window.location.href = "home.html";
    });
  </script>
</body>
</html>
