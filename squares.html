<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        .circle {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: teal;
        }
        
        .square {
            position: absolute;
            width: 50px;
            height: 50px;
            background-color: lime;
        }
    </style>
</head>

<body>

    <script>
        let numberOfCircles = parseInt(Math.random() * 90 + 10);

        for (let i = 0; i < numberOfCircles; i++) {
            const circle = document.createElement("div");
            circle.classList.add("square");

            const x = Math.random() * window.innerWidth * .9 + (window.innerWidth * 0.05);
            const y = Math.random() * window.innerHeight / 2;

            circle.style.left = x + "px";
            circle.style.top = y + "px";

            document.body.appendChild(circle);
        }
    </script>

    <div>
        <div class="box">
            <label for="Guess">Count how many:</label>
            <input type="text" id="input" required>
            <br><br>
            <input type="submit" value="Submit" id="btn">
        </div>

        <style>
            .box {
                position: absolute;
                top: 70vh;
                /* 70% of viewport height */
                left: 50%;
                transform: translateX(-50%);
                /* center horizontally */

                width: 150px;
                height: 100px;
            }
        </style>
    </div>
    <script>
        const input = document.getElementById("input");
        const button = document.getElementById("btn");

        button.addEventListener("click", () => {
            const value = input.value;
            if (value == numberOfCircles) {
                window.location.href = "congrats.html";

                // location.reload();
                // reloads the page if correct
            }
        });
    </script>
</body>

</html>
